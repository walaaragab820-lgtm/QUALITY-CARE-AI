<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QualityCare AI — Healthcare QMS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F0F4FA}
  button{font-family:inherit}
  textarea,input,select{font-family:inherit}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#F0F4FA}
  ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:99px}
  textarea::placeholder{color:rgba(255,255,255,0.55)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const C = {
  primary:"#0A4FA6", primaryLight:"#1D6FD8", primaryDark:"#062E6B",
  accent:"#00B4D8", success:"#0D9488", warning:"#F59E0B",
  danger:"#DC2626", critical:"#7C3AED",
  bg:"#F0F4FA", card:"#FFFFFF", border:"#D1DCF0",
  t1:"#0F172A", t2:"#475569", t3:"#94A3B8",
  sidebar:"#062E6B", sidebarTxt:"#CBD5E1",
};

const BADGE_STYLES = {
  Low:{bg:"#DCFCE7",tx:"#166534"}, Medium:{bg:"#FEF9C3",tx:"#854D0E"},
  High:{bg:"#FEE2E2",tx:"#991B1B"}, Critical:{bg:"#F3E8FF",tx:"#6B21A8"},
  Open:{bg:"#DBEAFE",tx:"#1E3A8A"}, Closed:{bg:"#D1FAE5",tx:"#065F46"},
  "Under Review":{bg:"#FEF3C7",tx:"#92400E"},
};

function Badge({label}){
  const s=BADGE_STYLES[label]||{bg:"#F1F5F9",tx:"#334155"};
  return <span style={{background:s.bg,color:s.tx,padding:"2px 10px",borderRadius:999,fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{label}</span>;
}

function KpiCard({icon,label,value,sub,color}){
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 20px",display:"flex",flexDirection:"column",gap:8,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:color}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <span style={{fontSize:11,color:C.t2,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</span>
        <div style={{width:36,height:36,borderRadius:8,background:color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{icon}</div>
      </div>
      <div style={{fontSize:28,fontWeight:700,color:C.t1,lineHeight:1}}>{value}</div>
      {sub && <div style={{fontSize:12,color:C.t3}}>{sub}</div>}
    </div>
  );
}

function ProgressBar({value,color}){
  return (
    <div style={{background:"#E2E8F0",borderRadius:99,height:8,overflow:"hidden"}}>
      <div style={{width:`${Math.min(value,100)}%`,height:"100%",background:color,borderRadius:99}}/>
    </div>
  );
}

function EmptyState({icon,msg}){
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 24px",color:C.t3}}>
      <div style={{fontSize:40,marginBottom:12,opacity:0.35}}>{icon}</div>
      <div style={{fontSize:13}}>{msg}</div>
    </div>
  );
}

function Sidebar({active,setActive}){
  const nav=[
    {id:"dashboard",icon:"🏠",label:"Dashboard"},
    {id:"complaints",icon:"📋",label:"Complaint Submission"},
    {id:"incidents",icon:"⚠️",label:"Incident Reporting"},
    
    {id:"analytics",icon:"📊",label:"Analytics"},
  ];
  return (
    <div style={{width:240,background:C.sidebar,minHeight:"100vh",display:"flex",flexDirection:"column",flexShrink:0}}>
      <div style={{padding:"20px 16px 16px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:C.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🏥</div>
          <div>
            <div style={{color:"#fff",fontWeight:700,fontSize:13,lineHeight:1.2}}>QualityCare AI</div>
            <div style={{color:C.sidebarTxt,fontSize:10,opacity:0.7}}>Healthcare QMS</div>
          </div>
        </div>
      </div>
      <div style={{flex:1,padding:"12px 8px"}}>
        {nav.map(item=>(
          <button key={item.id} onClick={()=>setActive(item.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:8,border:"none",cursor:"pointer",background:active===item.id?"rgba(29,111,216,0.35)":"transparent",color:active===item.id?"#fff":C.sidebarTxt,fontWeight:active===item.id?600:400,fontSize:13,marginBottom:2,textAlign:"left",borderLeft:active===item.id?`3px solid ${C.accent}`:"3px solid transparent"}}>
            <span style={{fontSize:16}}>{item.icon}</span>{item.label}
          </button>
        ))}
      </div>
      <div style={{padding:"16px",borderTop:"1px solid rgba(255,255,255,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:C.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:700}}>QS</div>
          <div style={{color:"#fff",fontSize:12,fontWeight:500}}>Quality Specialist</div>
        </div>
      </div>
    </div>
  );
}

function Header({title,subtitle}){
  const today=new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  return (
    <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontWeight:700,fontSize:18,color:C.t1}}>{title}</div>
        <div style={{fontSize:12,color:C.t2}}>{subtitle}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <span style={{background:"#DCFCE7",color:"#166534",fontSize:11,fontWeight:600,padding:"4px 10px",borderRadius:99}}>● System Online</span>
        <span style={{fontSize:12,color:C.t2}}>{today}</span>
      </div>
    </div>
  );
}

// ---------- DASHBOARD ----------
function DashboardPage({cases,onDelete}){
  const complaints=cases.filter(c=>c.type==="Complaint");
  const incidents=cases.filter(c=>c.type==="Incident");
  const highRisk=cases.filter(c=>c.risk==="High"||c.risk==="Critical");
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const monthly=months.map((m,mi)=>({
    month:m,
    c:cases.filter(x=>x.type==="Complaint"&&new Date(x.date).getMonth()===mi).length,
    i:cases.filter(x=>x.type==="Incident"&&new Date(x.date).getMonth()===mi).length,
  }));
  const maxBar=Math.max(...monthly.map(d=>d.c+d.i),1);
  const cats={};
  cases.forEach(c=>{if(c.category)cats[c.category]=(cats[c.category]||0)+1;});
  const catData=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const maxCat=catData.length?catData[0][1]:1;
  const catColors=[C.primary,C.danger,C.warning,C.success,C.accent,"#8B5CF6","#EC4899","#6366F1"];
  return (
    <div style={{padding:24,display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12}}>
        <KpiCard icon="📋" label="Total Complaints" value={complaints.length} sub="All time" color={C.primary}/>
        <KpiCard icon="⚠️" label="Total Incidents" value={incidents.length} sub="All time" color={C.warning}/>
        
        
        <KpiCard icon="🔴" label="High-Risk Cases" value={highRisk.length} sub="High + Critical" color={C.danger}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <div style={{fontWeight:600,fontSize:14,color:C.t1,marginBottom:4}}>Monthly Complaints & Incidents</div>
          <div style={{fontSize:12,color:C.t2,marginBottom:16}}>Current year</div>
          {cases.length===0?<EmptyState icon="📊" msg="No data yet — submit a complaint or incident to see trends"/>:(
            <>
              <svg width="100%" height="160" viewBox="0 0 560 160" style={{overflow:"visible"}}>
                {monthly.map((d,i)=>{
                  const x=22+i*45;
                  const ch=Math.round((d.c/maxBar)*120);
                  const ih=Math.round((d.i/maxBar)*120);
                  return (
                    <g key={i}>
                      <rect x={x-8} y={140-ch} width={14} height={ch} fill={C.primary} rx={2} opacity={0.85}/>
                      <rect x={x+8} y={140-ih} width={14} height={ih} fill={C.warning} rx={2} opacity={0.75}/>
                      <text x={x+3} y={156} textAnchor="middle" fontSize={9} fill={C.t3}>{d.month}</text>
                    </g>
                  );
                })}
                <line x1={14} y1={140} x2={556} y2={140} stroke={C.border} strokeWidth={1}/>
              </svg>
              <div style={{display:"flex",gap:16,marginTop:8}}>
                <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.t2}}><span style={{width:10,height:10,borderRadius:2,background:C.primary,display:"inline-block"}}/>Complaints</span>
                <span style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.t2}}><span style={{width:10,height:10,borderRadius:2,background:C.warning,display:"inline-block"}}/>Incidents</span>
              </div>
            </>
          )}
        </div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <div style={{fontWeight:600,fontSize:14,color:C.t1,marginBottom:4}}>Cases by Category</div>
          <div style={{fontSize:12,color:C.t2,marginBottom:16}}>Distribution across issue types</div>
          {catData.length===0?<EmptyState icon="🗂️" msg="No categories yet"/>:(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {catData.map(([cat,count],i)=>(
                <div key={cat} style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{fontSize:11,color:C.t2,width:130,flexShrink:0}}>{cat}</div>
                  <div style={{flex:1,background:"#E2E8F0",borderRadius:99,height:7}}>
                    <div style={{width:`${Math.round((count/maxCat)*100)}%`,height:"100%",background:catColors[i%catColors.length],borderRadius:99}}/>
                  </div>
                  <div style={{fontSize:11,color:C.t2,width:28,textAlign:"right"}}>{count}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
        <div style={{fontWeight:600,fontSize:14,color:C.t1,marginBottom:16}}>All Cases — Active Tracking</div>
        {cases.length===0?<EmptyState icon="📋" msg="No cases yet — use the sidebar to submit a complaint or incident"/>:(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{borderBottom:`1px solid ${C.border}`}}>
                  {["Case ID","Type","Patient","Department","Category","Risk","Date","Status",""].map(h=>(
                    <th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:11,fontWeight:600,color:C.t3,textTransform:"uppercase",letterSpacing:"0.04em"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[...cases].reverse().map((c,i)=>(
                  <tr key={c.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":"#FAFBFF"}}>
                    <td style={{padding:"10px 12px",fontSize:12,fontWeight:600,color:C.primary}}>{c.id}</td>
                    <td style={{padding:"10px 12px",fontSize:12}}>
                      <span style={{background:c.type==="Complaint"?"#DBEAFE":"#FEF3C7",color:c.type==="Complaint"?"#1D4ED8":"#92400E",padding:"2px 8px",borderRadius:99,fontSize:11,fontWeight:500}}>{c.type}</span>
                    </td>
                    <td style={{padding:"10px 12px",fontSize:12,color:C.t1}}>{c.patient||"—"}</td>
                    <td style={{padding:"10px 12px",fontSize:12,color:C.t2}}>{c.dept}</td>
                    <td style={{padding:"10px 12px",fontSize:12,color:C.t2}}>{c.category||"—"}</td>
                    <td style={{padding:"10px 12px"}}><Badge label={c.risk||"—"}/></td>
                    <td style={{padding:"10px 12px",fontSize:12,color:C.t3}}>{c.date}</td>
                    <td style={{padding:"10px 12px"}}><Badge label={c.status}/></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- INPUT STYLE ----------
const IS={border:`1px solid #D1DCF0`,borderRadius:8,padding:"9px 12px",fontSize:13,color:"#0F172A",background:"#fff",outline:"none",width:"100%",boxSizing:"border-box"};

function FF({label,required,children}){
  return (
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      <label style={{fontSize:13,fontWeight:500,color:"#0F172A"}}>{label}{required&&<span style={{color:"#DC2626"}}> *</span>}</label>
      {children}
    </div>
  );
}

// ---------- COMPLAINT ----------
let cmpN=1,incN=1;
function ComplaintPage({onSubmit}){
  const yr=new Date().getFullYear();
  const [form,setForm]=useState({id:`CMP-${yr}-${String(cmpN).padStart(4,"0")}`,name:"",date:new Date().toISOString().split("T")[0],dept:"",description:""});
  const [done,setDone]=useState(false);
  const go=()=>{
    if(!form.name||!form.dept||!form.description)return alert("Please fill all required fields.");
    cmpN++;
    onSubmit({...form,type:"Complaint",status:"Open",formType:"complaint"});
    setDone(true);
  };
  if(done) return (
    <div style={{padding:24,display:"flex",justifyContent:"center",alignItems:"center",minHeight:400}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:40,textAlign:"center",maxWidth:420}}>
        <div style={{fontSize:48,marginBottom:16}}>✅</div>
        <div style={{fontSize:18,fontWeight:700,color:C.t1,marginBottom:8}}>Complaint Submitted</div>
        <div style={{fontSize:13,color:C.t2,marginBottom:20}}>Case ID: <strong>{form.id}</strong> — logged and ready for AI analysis.</div>
        <button onClick={()=>{const id=`CMP-${yr}-${String(cmpN).padStart(4,"0")}`;setForm({id,name:"",date:new Date().toISOString().split("T")[0],dept:"",description:""});setDone(false);}} style={{background:C.primary,color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Submit Another</button>
      </div>
    </div>
  );
  return (
    <div style={{padding:24}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:28,maxWidth:700}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
          <div style={{width:44,height:44,borderRadius:12,background:"#DBEAFE",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>📋</div>
          <div>
            <div style={{fontWeight:700,fontSize:16,color:C.t1}}>Patient Complaint Form</div>
            <div style={{fontSize:12,color:C.t2}}>Submit and track patient complaints for quality review</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <FF label="Complaint ID"><input style={{...IS,background:"#F8FAFC",color:C.t3}} value={form.id} readOnly/></FF>
          <FF label="Date" required><input type="date" style={IS} value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></FF>
          <FF label="Patient Name" required><input style={IS} placeholder="Enter patient full name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></FF>
          <FF label="Department" required>
            <select style={IS} value={form.dept} onChange={e=>setForm({...form,dept:e.target.value})}>
              <option value="">Select Department</option>
              {["Emergency","Inpatient","Outpatient","ICU","Pharmacy","Radiology","Surgery","Maternity"].map(d=><option key={d}>{d}</option>)}
            </select>
          </FF>
        </div>
        <FF label="Complaint Description" required>
          <textarea style={{...IS,minHeight:130,resize:"vertical"}} placeholder="Describe the complaint in detail..." value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/>
        </FF>
        <div style={{marginTop:16,marginBottom:20}}>
          <FF label="Attachments">
            <div style={{border:`2px dashed ${C.border}`,borderRadius:8,padding:"20px",textAlign:"center",background:"#FAFBFF"}}>
              <div style={{fontSize:20,marginBottom:6}}>📎</div>
              <div style={{fontSize:13,color:C.t2}}>Drop files here or <span style={{color:C.primary,fontWeight:600}}>Browse</span></div>
              <div style={{fontSize:11,color:C.t3,marginTop:4}}>PDF, Images, Documents (Max 10MB)</div>
            </div>
          </FF>
        </div>
        <div style={{display:"flex",gap:12}}>
          <button onClick={go} style={{background:C.primary,color:"#fff",border:"none",borderRadius:8,padding:"11px 28px",fontSize:14,fontWeight:600,cursor:"pointer"}}>Submit Complaint →</button>
          <button style={{background:"transparent",color:C.t2,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 20px",fontSize:14,cursor:"pointer"}}>Save Draft</button>
        </div>
      </div>
    </div>
  );
}

// ---------- INCIDENT ----------
function IncidentPage({onSubmit}){
  const yr=new Date().getFullYear();
  const [form,setForm]=useState({id:`INC-${yr}-${String(incN).padStart(4,"0")}`,datetime:new Date().toISOString().slice(0,16),dept:"",type:"",severity:"",description:"",reporter:""});
  const [done,setDone]=useState(false);
  const sevRisk={"Low — No harm":"Low","Medium — Minor harm":"Medium","High — Significant harm":"High","Critical — Life-threatening":"Critical"};
  const go=()=>{
    if(!form.dept||!form.type||!form.severity||!form.description)return alert("Please fill all required fields.");
    incN++;
    onSubmit({...form,name:form.reporter,patient:"",date:form.datetime.split("T")[0],type:"Incident",category:form.type,risk:sevRisk[form.severity]||"Medium",status:"Open",formType:"incident"});
    setDone(true);
  };
  if(done) return (
    <div style={{padding:24,display:"flex",justifyContent:"center",alignItems:"center",minHeight:400}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:40,textAlign:"center",maxWidth:420}}>
        <div style={{fontSize:48,marginBottom:16}}>✅</div>
        <div style={{fontSize:18,fontWeight:700,color:C.t1,marginBottom:8}}>Incident Reported</div>
        <div style={{fontSize:13,color:C.t2,marginBottom:20}}>Incident ID: <strong>{form.id}</strong> — AI analysis is in progress.</div>
        <button onClick={()=>{incN++;setForm({id:`INC-${yr}-${String(incN).padStart(4,"0")}`,datetime:new Date().toISOString().slice(0,16),dept:"",type:"",severity:"",description:"",reporter:""});setDone(false);}} style={{background:C.warning,color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Report Another</button>
      </div>
    </div>
  );
  return (
    <div style={{padding:24}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:28,maxWidth:700}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
          <div style={{width:44,height:44,borderRadius:12,background:"#FEF3C7",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⚠️</div>
          <div>
            <div style={{fontWeight:700,fontSize:16,color:C.t1}}>Incident Report Form</div>
            <div style={{fontSize:12,color:C.t2}}>Report patient safety incidents and adverse events</div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <FF label="Incident ID"><input style={{...IS,background:"#F8FAFC",color:C.t3}} value={form.id} readOnly/></FF>
          <FF label="Date & Time" required><input type="datetime-local" style={IS} value={form.datetime} onChange={e=>setForm({...form,datetime:e.target.value})}/></FF>
          <FF label="Department" required>
            <select style={IS} value={form.dept} onChange={e=>setForm({...form,dept:e.target.value})}>
              <option value="">Select Department</option>
              {["Emergency","Inpatient","Outpatient","ICU","Pharmacy","Radiology","Surgery","Maternity"].map(d=><option key={d}>{d}</option>)}
            </select>
          </FF>
          <FF label="Incident Type" required>
            <select style={IS} value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
              <option value="">Select Type</option>
              {["Medication Error","Patient Fall","Surgical Error","Diagnostic Error","Equipment Failure","Infection Event","Documentation Error","Near Miss"].map(t=><option key={t}>{t}</option>)}
            </select>
          </FF>
          <FF label="Severity Level" required>
            <select style={IS} value={form.severity} onChange={e=>setForm({...form,severity:e.target.value})}>
              <option value="">Select Severity</option>
              {["Low — No harm","Medium — Minor harm","High — Significant harm","Critical — Life-threatening"].map(s=><option key={s}>{s}</option>)}
            </select>
          </FF>
          <FF label="Reporter Name"><input style={IS} placeholder="Your name or staff ID" value={form.reporter} onChange={e=>setForm({...form,reporter:e.target.value})}/></FF>
        </div>
        <FF label="Incident Description" required>
          <textarea style={{...IS,minHeight:130,resize:"vertical"}} placeholder="Describe the incident clearly..." value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/>
        </FF>
        <div style={{marginTop:20,display:"flex",gap:12}}>
          <button onClick={go} style={{background:C.warning,color:"#fff",border:"none",borderRadius:8,padding:"11px 28px",fontSize:14,fontWeight:600,cursor:"pointer"}}>Submit Report →</button>
          <button style={{background:"transparent",color:C.t2,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 20px",fontSize:14,cursor:"pointer"}}>Save Draft</button>
        </div>
      </div>
    </div>
  );
}

// ---------- ANALYTICS ----------
function AnalyticsPage({cases}){
  const depts={};const incTypes={};
  cases.forEach(c=>{
    if(c.dept)depts[c.dept]=depts[c.dept]||{complaints:0,incidents:0};
    if(c.type==="Complaint"&&c.dept)depts[c.dept].complaints++;
    if(c.type==="Incident"&&c.dept)depts[c.dept].incidents++;
    if(c.type==="Incident"&&c.category)incTypes[c.category]=(incTypes[c.category]||0)+1;
  });
  const deptArr=Object.entries(depts).sort((a,b)=>b[1].complaints-a[1].complaints);
  const incArr=Object.entries(incTypes).sort((a,b)=>b[1]-a[1]);
  const maxD=deptArr.length?Math.max(...deptArr.map(d=>d[1].complaints),1):1;
  const maxI=incArr.length?incArr[0][1]:1;
  const cats={};cases.forEach(c=>{if(c.category)cats[c.category]=(cats[c.category]||0)+1;});
  const topProbs=Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const riskDist={Low:0,Medium:0,High:0,Critical:0};
  cases.forEach(c=>{if(c.risk&&riskDist[c.risk]!==undefined)riskDist[c.risk]++;});
  const RC2={Low:C.success,Medium:C.warning,High:C.danger,Critical:C.critical};
  return (
    <div style={{padding:24,display:"flex",flexDirection:"column",gap:20}}>
      {cases.length===0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:48}}><EmptyState icon="📊" msg="No data yet — submit complaints or incidents to see analytics"/></div>}
      {cases.length>0&&(
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
              <div style={{fontWeight:600,fontSize:14,color:C.t1,marginBottom:16}}>Complaints by Department</div>
              {deptArr.length===0?<EmptyState icon="🏥" msg="No department data"/>:(
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {deptArr.map(([dept,d])=>(
                    <div key={dept} style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{fontSize:12,color:C.t2,width:90,flexShrink:0}}>{dept}</div>
                      <div style={{flex:1,background:"#E2E8F0",borderRadius:99,height:9}}>
                        <div style={{width:`${Math.round((d.complaints/maxD)*100)}%`,height:"100%",background:C.primary,borderRadius:99}}/>
                      </div>
                      <div style={{fontSize:12,fontWeight:600,color:C.t1,width:28,textAlign:"right"}}>{d.complaints}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
              <div style={{fontWeight:600,fontSize:14,color:C.t1,marginBottom:16}}>Incidents by Type</div>
              {incArr.length===0?<EmptyState icon="⚠️" msg="No incidents yet"/>:(
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {incArr.map(([type,count])=>(
                    <div key={type} style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{fontSize:12,color:C.t2,width:130,flexShrink:0}}>{type}</div>
                      <div style={{flex:1,background:"#E2E8F0",borderRadius:99,height:9}}>
                        <div style={{width:`${Math.round((count/maxI)*100)}%`,height:"100%",background:C.warning,borderRadius:99}}/>
                      </div>
                      <div style={{fontSize:12,fontWeight:600,color:C.t1,width:28,textAlign:"right"}}>{count}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
              <div style={{fontWeight:600,fontSize:14,color:C.t1,marginBottom:16}}>Risk Level Distribution</div>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {Object.entries(riskDist).map(([level,count])=>(
                  <div key={level} style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:70,fontSize:12,fontWeight:500,color:RC2[level]}}>{level}</div>
                    <div style={{flex:1,background:"#E2E8F0",borderRadius:99,height:10}}>
                      <div style={{width:cases.length?`${Math.round((count/cases.length)*100)}%`:"0%",height:"100%",background:RC2[level],borderRadius:99}}/>
                    </div>
                    <div style={{fontSize:12,fontWeight:700,color:C.t2,width:28,textAlign:"right"}}>{count}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
              <div style={{fontWeight:600,fontSize:14,color:C.t1,marginBottom:16}}>Top Recurring Problems</div>
              {topProbs.length===0?<EmptyState icon="🔍" msg="No patterns yet"/>:(
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {topProbs.map(([problem,count],i)=>(
                    <div key={problem} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:i===0?"#FEF2F2":"#FAFBFF",borderRadius:8,border:`1px solid ${i===0?"#FECACA":C.border}`}}>
                      <div style={{width:22,height:22,borderRadius:"50%",background:i<2?C.danger:i<4?C.warning:C.success,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0}}>{i+1}</div>
                      <div style={{flex:1,fontSize:12,color:C.t1}}>{problem}</div>
                      <div style={{fontSize:12,fontWeight:700,color:C.t2}}>{count}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ---------- APP ----------
const META={
  dashboard:{title:"Quality Management Dashboard",subtitle:"Real-time overview of patient complaints, incidents, and quality performance"},
  complaints:{title:"Patient Complaint Submission",subtitle:"Submit and track patient complaints for systematic quality review"},
  incidents:{title:"Incident Reporting System",subtitle:"Report patient safety incidents and adverse events"},
  
  analytics:{title:"Analytics & Performance",subtitle:"Deep insights into complaint patterns, risk distribution, and quality trends"},
};

function LoginPage({onLogin}){
  const [user,setUser]=React.useState("");
  const [pass,setPass]=React.useState("");
  const [err,setErr]=React.useState(false);
  const go=()=>{
    if(user==="walaa othman"&&pass==="123456"){onLogin();}
    else{setErr(true);}
  };
  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#062E6B 0%,#0A4FA6 100%)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:20,padding:40,width:380,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:60,height:60,borderRadius:16,background:"#0A4FA6",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 16px"}}>🏥</div>
          <div style={{fontSize:20,fontWeight:700,color:"#0F172A"}}>QualityCare AI</div>
          <div style={{fontSize:13,color:"#475569",marginTop:4}}>Healthcare Quality Management System</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <label style={{fontSize:13,fontWeight:500,color:"#0F172A",display:"block",marginBottom:5}}>Username</label>
            <input value={user} onChange={e=>{setUser(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Enter your username" style={{width:"100%",padding:"10px 12px",border:"1px solid #D1DCF0",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
          </div>
          <div>
            <label style={{fontSize:13,fontWeight:500,color:"#0F172A",display:"block",marginBottom:5}}>Password</label>
            <input type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="Enter your password" style={{width:"100%",padding:"10px 12px",border:"1px solid #D1DCF0",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
          </div>
          {err&&<div style={{background:"#FEE2E2",border:"1px solid #FECACA",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#DC2626"}}>⚠️ Incorrect username or password.</div>}
          <button onClick={go} style={{background:"#0A4FA6",color:"#fff",border:"none",borderRadius:8,padding:"12px",fontSize:14,fontWeight:600,cursor:"pointer",marginTop:4}}>Login →</button>
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:11,color:"#94A3B8"}}>Healthcare QMS · Quality Specialist Portal</div>
      </div>
    </div>
  );
}

function App(){
  const [loggedIn,setLoggedIn]=useState(false);
  const [page,setPage]=useState("dashboard");
  const [cases,setCases]=useState(()=>{ try{ const s=localStorage.getItem("qc_cases"); return s?JSON.parse(s):[]; }catch(e){return [];} });
  

  const submit=(data)=>{
    setCases(p=>{
      const next=[...p,data];
      localStorage.setItem("qc_cases",JSON.stringify(next));
      return next;
    });
  };
  const update=(id,upd)=>setCases(p=>p.map(c=>c.id===id?{...c,...upd}:c));
  const m=META[page];

  if(!loggedIn) return <LoginPage onLogin={()=>setLoggedIn(true)}/>;
  return (
    <div style={{display:"flex",minHeight:"100vh",background:C.bg}}>
      <Sidebar active={page} setActive={setPage}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"auto"}}>
        <Header title={m.title} subtitle={m.subtitle}/>
        <div style={{flex:1,overflow:"auto"}}>
          {page==="dashboard"&&<DashboardPage cases={cases} onDelete={id=>setCases(p=>{ const next=p.filter(c=>c.id!==id); localStorage.setItem("qc_cases",JSON.stringify(next)); return next; })}/>}
          {page==="complaints"&&<ComplaintPage onSubmit={submit}/>}
          {page==="incidents"&&<IncidentPage onSubmit={submit}/>}
          
          {page==="analytics"&&<AnalyticsPage cases={cases}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
